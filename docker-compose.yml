services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: epa_kg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chromadata:/chroma/data
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.basic.BasicAuthCredentialsProvider
      - CHROMA_SERVER_AUTH_CREDENTIALS=admin:admin
      - CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER=X-Chroma-Token
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 10s
      retries: 5

  ingestion:
    build: .
    command: []
    ports:
      - "8001:8001"
    environment:
      - EPA_KG__CHROMA__HOST=chroma
      - EPA_KG__CHROMA__PORT=8000
      - EPA_KG__CHROMA__USE_CLOUD=false
      - EPA_KG__EMBEDDING__PROVIDER=fastembed
      - EPA_KG__LLM__PROVIDER=none
      - SERVICE=ingestion
    volumes:
      - chromadata:/chroma/data
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build: .
    command: []
    ports:
      - "8080:8080"
    environment:
      - EPA_KG__CHROMA__HOST=127.0.0.1
      - EPA_KG__CHROMA__PORT=8001
      - EPA_KG__CHROMA__USE_CLOUD=false
      - EPA_KG__DATABASE__URL=postgresql://postgres:postgres@postgres:5432/epa_kg
      - SERVICE=api
    depends_on:
      ingestion:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  chromadata:
